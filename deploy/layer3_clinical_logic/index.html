<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Layer 3 Clinical Logic Engine</title>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-tertiary: #242833;
  --text-primary: #e4e4e7;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-subtle: rgba(59, 130, 246, 0.1);
  --positive: #22c55e;
  --negative: #6b7280;
  --warning: #f59e0b;
  --critical: #ef4444;
  --border: #2a2d37;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

/* Header */
.header {
  background: var(--bg-secondary);
  padding: 16px 30px;
  border-bottom: 1px solid var(--border);
}
.header h1 {
  font-size: 20px;
  color: var(--text-primary);
  font-weight: 600;
}
.header p {
  color: var(--text-secondary);
  margin-top: 4px;
  font-size: 13px;
}

/* Layout */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  display: grid;
  grid-template-columns: 360px 1fr;
  gap: 20px;
}

/* Panel */
.panel {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px;
}
.panel h2 {
  color: var(--text-primary);
  margin-bottom: 15px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  font-weight: 600;
}

/* Scenario buttons */
.scenario-grid { display: grid; gap: 10px; }
.scenario-btn {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  cursor: pointer;
  text-align: left;
  transition: border-color 0.2s;
}
.scenario-btn:hover {
  border-color: var(--accent);
}
.scenario-btn.active {
  border-color: var(--accent);
  background: var(--accent-subtle);
}
.scenario-btn .name {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 4px;
  font-size: 14px;
}
.scenario-btn .desc {
  font-size: 12px;
  color: var(--text-secondary);
}
.scenario-btn.critical .name { color: var(--critical); }
.scenario-btn.normal .name { color: var(--positive); }

/* Action buttons */
.action-btns { display: flex; gap: 8px; margin-top: 15px; }
.btn {
  padding: 10px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover {
  background: var(--accent-hover);
}
.btn-random {
  background: var(--accent);
  color: white;
}
.btn-random:hover {
  background: var(--accent-hover);
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Result area */
.result-area { display: grid; gap: 15px; }

/* Risk banner */
.risk-banner {
  padding: 14px 20px;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 700;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.risk-routine {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.risk-urgent {
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid var(--warning);
  color: var(--warning);
}
.risk-critical {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid var(--critical);
  color: var(--critical);
}

/* Finding cards */
.findings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}
.finding-card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.finding-card.detected {
  border-left: 4px solid var(--critical);
}
.finding-card.clear {
  border-left: 4px solid var(--positive);
}
.finding-card.alert {
  border-left: 4px solid var(--warning);
  background: var(--bg-secondary);
}
.finding-name {
  font-weight: 600;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.finding-name .badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.badge-detected { background: var(--critical); color: white; }
.badge-clear { background: var(--positive); color: white; }
.badge-alert { background: var(--warning); color: black; }
.finding-detail {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 6px;
  padding-left: 16px;
}
.finding-detail li { margin: 2px 0; }
.finding-confidence {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

/* Differential diagnosis */
.diff-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin-bottom: 8px;
}
.diff-card.critical {
  border-color: var(--critical);
  background: rgba(239, 68, 68, 0.05);
}
.diff-name {
  font-weight: 600;
  color: var(--text-primary);
  font-size: 14px;
}
.diff-detail {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

/* Input summary */
.input-summary {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 15px;
  font-size: 13px;
  max-height: 300px;
  overflow-y: auto;
}
.input-summary pre {
  white-space: pre-wrap;
  color: var(--text-secondary);
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 12px;
}

/* Cross-validation table */
.cv-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
}
.cv-table th {
  background: var(--bg-tertiary);
  padding: 8px 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 600;
}
.cv-table td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  color: var(--text-primary);
}
.cv-table .yes { color: var(--positive); }
.cv-table .no { color: var(--text-muted); }

/* Meta */
.meta {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 10px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <h1>Layer 3: Clinical Logic Engine</h1>
  <p>14-Disease Rule-Based Assessment</p>
</div>

<div class="container">
  <!-- Left panel: scenario selection -->
  <div>
    <div class="panel">
      <h2>Scenario</h2>
      <div class="scenario-grid">
        <div class="scenario-btn active" data-id="chf" onclick="selectScenario(this)">
          <div class="name">CHF (심부전)</div>
          <div class="desc">72세 남성, 심비대+양측흉수+폐부종</div>
        </div>
        <div class="scenario-btn" data-id="pneumonia" onclick="selectScenario(this)">
          <div class="name">Pneumonia (폐렴)</div>
          <div class="desc">67세 남성, 좌하엽경화+발열+기침</div>
        </div>
        <div class="scenario-btn critical" data-id="tension_pneumo" onclick="selectScenario(this)">
          <div class="name">Tension Pneumothorax (응급)</div>
          <div class="desc">25세 남성, 교통사고 후 좌측기흉</div>
        </div>
        <div class="scenario-btn normal" data-id="normal" onclick="selectScenario(this)">
          <div class="name">Normal (정상)</div>
          <div class="desc">모든 지표 정상 범위</div>
        </div>
      </div>

      <div class="action-btns">
        <button class="btn btn-primary" id="btnRun" onclick="runScenario()">실행</button>
        <button class="btn btn-random" onclick="runRandom()">랜덤 생성</button>
      </div>
    </div>

    <div class="panel" style="margin-top:15px;">
      <h2>Input Summary</h2>
      <div class="input-summary" id="inputSummary">
        <pre>시나리오를 선택하고 실행하세요.</pre>
      </div>
    </div>
  </div>

  <!-- Right: result area -->
  <div class="result-area" id="resultArea">
    <div class="panel" style="text-align:center; padding:60px; color:var(--text-muted);">
      시나리오를 선택하고 "실행"을 눌러 Clinical Logic 결과를 확인하세요.
    </div>
  </div>
</div>

<script>
let selectedScenario = 'chf';
const API_URL = window.location.href.replace(/\/$/, '');

function selectScenario(el) {
  document.querySelectorAll('.scenario-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedScenario = el.dataset.id;
}

async function callAPI(payload) {
  const btnRun = document.getElementById('btnRun');
  btnRun.disabled = true;
  btnRun.innerHTML = '<span class="spinner"></span>';

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (typeof data.body === 'string') {
      return JSON.parse(data.body);
    }
    return data;
  } catch(e) {
    return {error: e.message};
  } finally {
    btnRun.disabled = false;
    btnRun.textContent = '실행';
  }
}

async function runScenario() {
  const data = await callAPI({action: 'scenario', scenario: selectedScenario});
  renderResult(data);
}

async function runRandom() {
  const data = await callAPI({action: 'random'});
  renderResult(data);
}

function renderResult(data) {
  if (data.error) {
    document.getElementById('resultArea').innerHTML =
      `<div class="panel" style="color:#ef4444;">Error: ${data.error}</div>`;
    return;
  }

  // 입력 요약
  document.getElementById('inputSummary').innerHTML =
    `<pre>${JSON.stringify(data.input_summary, null, 2)}</pre>`;

  const r = data.result;
  let html = '';

  // 위험도 배너 (3단계: critical / urgent / routine)
  const riskClassMap = {critical:'risk-critical', urgent:'risk-urgent', routine:'risk-routine'};
  const riskClass = riskClassMap[r.risk_level] || 'risk-routine';
  let riskText;
  if (r.risk_level === 'critical') riskText = `CRITICAL — ${r.alert_flags.join(', ')}`;
  else if (r.risk_level === 'urgent') riskText = `URGENT — severe 소견 다수, ${r.detected_count}개 탐지`;
  else riskText = `ROUTINE — ${r.detected_count}개 소견 탐지`;
  html += `<div class="risk-banner ${riskClass}">${riskText}</div>`;

  // 감별 진단
  if (r.differential_diagnosis && r.differential_diagnosis.length > 0) {
    html += '<div class="panel"><h2>감별 진단</h2>';
    for (const d of r.differential_diagnosis) {
      const cls = d.probability === 'critical' ? 'critical' : '';
      html += `<div class="diff-card ${cls}">
        <div class="diff-name">${d.diagnosis} (${d.probability})</div>
        <div class="diff-detail">근거: ${d.matched_findings.join(', ')}
          ${d.matched_flags.length ? ' + ' + d.matched_flags.join(', ') : ''}</div>
      </div>`;
    }
    html += '</div>';
  }

  // 14개 질환 소견
  html += '<div class="panel"><h2>14개 질환 판정</h2><div class="findings-grid">';
  const order = ['Cardiomegaly','Pleural_Effusion','Pneumothorax','Consolidation',
    'Edema','Atelectasis','Pneumonia','Enlarged_Cardiomediastinum',
    'Fracture','Lung_Lesion','Lung_Opacity','Pleural_Other',
    'Support_Devices','No_Finding'];

  for (const name of order) {
    const f = r.findings[name];
    if (!f) continue;
    let cardClass = f.detected ? 'detected' : 'clear';
    if (f.alert) cardClass = 'alert';
    let badgeClass = f.detected ? 'badge-detected' : 'badge-clear';
    if (f.alert) badgeClass = 'badge-alert';
    const badgeText = f.alert ? 'ALERT' : (f.detected ? (name==='No_Finding'?'NORMAL':'DETECTED') : 'CLEAR');

    html += `<div class="finding-card ${cardClass}">
      <div class="finding-name">
        <span>${f.finding}</span>
        <span class="badge ${badgeClass}">${badgeText}</span>
      </div>`;

    if (f.detected || f.alert) {
      html += '<ul class="finding-detail">';
      for (const e of f.evidence) {
        html += `<li>${e}</li>`;
      }
      if (f.severity) html += `<li>중증도: <b>${f.severity}</b></li>`;
      if (f.location) html += `<li>위치: ${f.location}</li>`;
      if (f.recommendation) html += `<li style="color:#f59e0b;">권고: ${f.recommendation}</li>`;
      html += '</ul>';
    }

    html += `<div class="finding-confidence">Confidence: ${f.confidence}</div>`;
    html += '</div>';
  }
  html += '</div></div>';

  // 교차 검증 테이블
  html += '<div class="panel"><h2>교차 검증 (DenseNet vs YOLO vs Logic)</h2>';
  html += '<table class="cv-table"><tr><th>질환</th><th>DenseNet</th><th>YOLO</th><th>Logic</th><th>일치도</th><th>Flag</th></tr>';
  for (const [name, cv] of Object.entries(r.cross_validation)) {
    const s = cv.sources;
    html += `<tr>
      <td>${name}</td>
      <td class="${s.densenet?'yes':'no'}">${s.densenet?'O':'X'}</td>
      <td class="${s.yolo?'yes':'no'}">${s.yolo?'O':'X'}</td>
      <td class="${s.clinical_logic?'yes':'no'}">${s.clinical_logic?'O':'X'}</td>
      <td>${cv.agreement} (${cv.confidence})</td>
      <td style="color:#f59e0b;">${cv.flag||''}</td>
    </tr>`;
  }
  html += '</table></div>';

  // 메타 정보
  html += `<div class="meta">Mode: ${data.mode} | Processing: ${data.processing_time_sec}s</div>`;

  document.getElementById('resultArea').innerHTML = html;
}
</script>
</body>
</html>
