<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECG Modal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #12141f;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 24px 32px 20px;
      border-bottom: 1px solid #1e2132;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header p  { font-size: 13px; color: #64748b; margin-top: 4px; }

    /* ── Sample Buttons ── */
    .samples {
      display: flex;
      gap: 10px;
      padding: 20px 32px;
      flex-wrap: wrap;
      align-items: center;
    }
    .sample-btn {
      padding: 8px 20px;
      background: #1e2132;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #cbd5e1;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sample-btn:hover   { background: #2d3148; border-color: #4a5080; color: #fff; }
    .sample-btn.active  { background: #2d3148; border-color: #6366f1; color: #fff; }

    /* ── Main Layout ── */
    .main {
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 16px;
      padding: 0 32px 32px;
    }

    /* ── Left Panel ── */
    .left-panel {
      background: #1a1d2e;
      border: 1px solid #1e2132;
      border-radius: 8px;
      min-height: 440px;
      display: flex;
      flex-direction: column;
    }

    .patient-form {
      padding: 24px;
      flex: 1;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-full { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
      font-weight: 600;
    }
    input, textarea, select {
      width: 100%;
      background: #12141f;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 9px 12px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus { border-color: #6366f1; }
    textarea { resize: vertical; min-height: 60px; }

    .signal-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #4a5568;
      gap: 10px;
      font-size: 13px;
    }

    /* ECG waveform preview */
    .waveform-preview {
      width: 100%;
      padding: 16px 24px;
      border-top: 1px solid #1e2132;
    }
    .waveform-preview svg { width: 100%; height: 60px; }

    /* ── Right Panel ── */
    .right-panel {
      background: #1a1d2e;
      border: 1px solid #1e2132;
      border-radius: 8px;
      padding: 24px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Pipeline steps */
    .pipeline-steps { display: flex; flex-direction: column; gap: 0; }
    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid #1e2132;
    }
    .step:last-child { border-bottom: none; }

    .step-check {
      width: 16px; height: 16px;
      border: 1.5px solid #2d3148;
      border-radius: 3px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .step-check.done   { background: #6366f1; border-color: #6366f1; }
    .step-check.active { border-color: #6366f1; animation: pulse-border 1s infinite; }
    @keyframes pulse-border { 0%,100%{border-color:#6366f1} 50%{border-color:#4f46e5} }

    .step-check svg { display: none; }
    .step-check.done svg { display: block; }

    .step-name { font-size: 13px; color: #94a3b8; flex: 1; transition: color 0.3s; }
    .step.done  .step-name   { color: #e2e8f0; }
    .step.active .step-name  { color: #a5b4fc; }

    .step-spinner {
      width: 14px; height: 14px;
      border: 2px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .step.active .step-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Analyze button */
    .btn-analyze {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.15s;
    }
    .btn-analyze:hover    { background: #6366f1; }
    .btn-analyze:disabled { background: #1e2132; color: #4a5568; cursor: not-allowed; }

    /* ── Results ── */
    .results { padding: 0 32px 32px; display: none; }
    .results.show { display: block; }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .result-card {
      background: #1a1d2e;
      border: 1px solid #1e2132;
      border-radius: 8px;
      padding: 20px;
    }
    .result-card.full { grid-column: 1 / -1; }

    .result-card h3 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #64748b;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    /* Risk badge */
    .risk-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .risk-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 1px;
    }
    .badge-critical { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
    .badge-urgent   { background: #78350f; color: #fcd34d; border: 1px solid #92400e; }
    .badge-routine  { background: #14532d; color: #86efac; border: 1px solid #166534; }

    .risk-text { font-size: 13px; line-height: 1.7; color: #cbd5e1; }

    /* Finding items */
    .finding { padding: 11px 14px; border-radius: 6px; background: #12141f; margin-bottom: 7px; }
    .finding:last-child { margin-bottom: 0; }
    .finding-top { display: flex; align-items: center; gap: 8px; }
    .finding-dot {
      width: 7px; height: 7px;
      border-radius: 50%; flex-shrink: 0;
    }
    .dot-critical { background: #ef4444; }
    .dot-severe   { background: #f97316; }
    .dot-moderate { background: #6366f1; }
    .dot-mild     { background: #64748b; }

    .finding-name { font-size: 13px; flex: 1; }
    .finding-pct  {
      font-size: 12px; font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .pct-high { color: #ef4444; }
    .pct-mid  { color: #f97316; }
    .pct-low  { color: #64748b; }

    .finding-rec {
      font-size: 11px;
      color: #64748b;
      margin-top: 5px;
      padding-left: 15px;
    }

    /* Needs confirm */
    .confirm { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #12141f; border-radius: 6px; margin-bottom: 7px; }
    .confirm:last-child { margin-bottom: 0; }
    .confirm-name { font-size: 13px; flex: 1; color: #94a3b8; }
    .confirm-tag  { font-size: 10px; padding: 2px 7px; background: #1e2132; border-radius: 4px; color: #64748b; }
    .confirm-pct  { font-size: 12px; color: #64748b; font-variant-numeric: tabular-nums; }

    /* Metadata */
    .meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .meta-box  { background: #12141f; border-radius: 6px; padding: 14px; text-align: center; }
    .meta-lbl  { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-val  { font-size: 24px; font-weight: 700; margin: 6px 0 2px; }
    .meta-unit { font-size: 10px; color: #64748b; }
    .val-warn  { color: #ef4444; }
    .val-ok    { color: #22c55e; }
    .val-norm  { color: #e2e8f0; }

    /* Negatives */
    .neg-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .neg-pill {
      font-size: 11px; padding: 4px 12px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 20px; color: #4ade80;
    }

    .error-box {
      padding: 14px 18px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 6px;
      font-size: 13px; color: #f87171;
    }
  </style>
</head>
<body>

<header>
  <h1>ECG Modal &mdash; 12-Lead Analysis</h1>
  <p>Signal Loading &rarr; Preprocessing &rarr; ONNX Inference &rarr; Clinical Logic &rarr; Risk Assessment</p>
</header>

<!-- Sample Buttons -->
<div class="samples">
  <button class="sample-btn" onclick="loadSample('stemi')">STEMI (심근경색)</button>
  <button class="sample-btn" onclick="loadSample('normal')">Normal (정상)</button>
  <button class="sample-btn" onclick="loadSample('afib')">AFib (심방세동)</button>
  <button class="sample-btn" onclick="loadSample('vfib')">VFib (심실세동)</button>
  <button class="sample-btn" onclick="loadSample('avblock')">AVBlock (방실차단)</button>
  <button class="sample-btn" id="customBtn" onclick="focusCustom()">Custom Input</button>
</div>

<!-- Main -->
<div class="main">

  <!-- Left: Patient + Signal -->
  <div class="left-panel">
    <div class="patient-form">
      <div class="form-row">
        <div>
          <label>Patient ID *</label>
          <input id="patient_id" value="test-001" />
        </div>
        <div>
          <label>Chief Complaint</label>
          <input id="complaint" placeholder="흉통, dyspnea …" />
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>Age</label>
          <input id="age" type="number" placeholder="예: 65" />
        </div>
        <div>
          <label>Sex</label>
          <select id="sex">
            <option value="">-</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>
        </div>
      </div>
      <div class="form-full">
        <label>ECG Signal Path (S3 or local .npy)</label>
        <input id="signal_path" placeholder="s3://bucket/path/signal.npy" />
      </div>
      <div class="form-full">
        <label>Context — Previous Findings (optional)</label>
        <textarea id="prev_findings" placeholder="CXR: 심비대, Blood: troponin 0.04"></textarea>
      </div>
    </div>

    <!-- waveform placeholder -->
    <div class="waveform-preview">
      <svg id="waveformSvg" viewBox="0 0 600 60" preserveAspectRatio="none">
        <polyline id="waveformLine"
          points="0,30 30,30 40,10 50,50 60,30 90,30 100,5 110,55 120,30 150,30 160,15 170,45 180,30 210,30 220,8 230,52 240,30 270,30 280,12 290,48 300,30 330,30 340,10 350,50 360,30 390,30 400,5 410,55 420,30 450,30 460,15 470,45 480,30 510,30 520,8 530,52 540,30 570,30 580,12 590,48 600,30"
          fill="none" stroke="#2d3148" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <!-- Right: Pipeline -->
  <div class="right-panel">
    <div class="panel-title">Pipeline Progress</div>

    <div class="pipeline-steps">
      <div class="step" id="step-0">
        <div class="step-check">
          <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
        </div>
        <span class="step-name">Step 1: Signal Loading</span>
        <div class="step-spinner"></div>
      </div>
      <div class="step" id="step-1">
        <div class="step-check">
          <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
        </div>
        <span class="step-name">Step 2: Z-Score Normalization</span>
        <div class="step-spinner"></div>
      </div>
      <div class="step" id="step-2">
        <div class="step-check">
          <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
        </div>
        <span class="step-name">Step 3: ONNX ResNet Inference</span>
        <div class="step-spinner"></div>
      </div>
      <div class="step" id="step-3">
        <div class="step-check">
          <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
        </div>
        <span class="step-name">Step 4: Label Detection (13 classes)</span>
        <div class="step-spinner"></div>
      </div>
      <div class="step" id="step-4">
        <div class="step-check">
          <svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1,5 4,8 9,2" fill="none" stroke="#fff" stroke-width="1.5"/></svg>
        </div>
        <span class="step-name">Step 5: Risk Classification</span>
        <div class="step-spinner"></div>
      </div>
    </div>

    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">Analyze ECG</button>
  </div>
</div>

<!-- Results -->
<div class="results" id="results">
  <div id="resultsInner"></div>
</div>

<script>
  const API = 'https://1ph4ttzgc0.execute-api.ap-northeast-2.amazonaws.com';

  const SAMPLES = {
    stemi:   { path: 's3://ecg-svc-models-905418313170/test-samples/stemi.npy',   complaint: '흉통',    age: 62, sex: 'M', id: 'stemi-sample' },
    normal:  { path: 's3://ecg-svc-models-905418313170/test-samples/normal.npy',  complaint: '',        age: 45, sex: 'F', id: 'normal-sample' },
    afib:    { path: 's3://ecg-svc-models-905418313170/test-samples/afib.npy',    complaint: '호흡곤란', age: 70, sex: 'M', id: 'afib-sample' },
    vfib:    { path: 's3://ecg-svc-models-905418313170/test-samples/vfib.npy',    complaint: '의식저하', age: 58, sex: 'M', id: 'vfib-sample' },
    avblock: { path: 's3://ecg-svc-models-905418313170/test-samples/avblock.npy', complaint: '실신',    age: 74, sex: 'F', id: 'avblock-sample' },
  };

  const ECG_CONFIRMED = new Set(['ST분절 상승 심근경색','심실세동/심실빈맥','3도 방실차단','심방세동','좌각차단','부정맥','발작성 상심실 빈맥']);

  function loadSample(name) {
    document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const s = SAMPLES[name];
    document.getElementById('signal_path').value  = s.path;
    document.getElementById('complaint').value    = s.complaint;
    document.getElementById('age').value          = s.age;
    document.getElementById('sex').value          = s.sex;
    document.getElementById('patient_id').value   = s.id;
    animateWaveform(name);
  }

  function focusCustom() {
    document.querySelectorAll('.sample-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('customBtn').classList.add('active');
    document.getElementById('signal_path').focus();
  }

  function animateWaveform(type) {
    const presets = {
      stemi:   '0,30 30,30 40,5 50,55 60,30 90,30 95,2 105,58 115,30 120,18 130,18 160,30 180,30 185,5 195,55 205,30 240,30 245,2 255,58 265,30 270,18 280,18 300,30 330,30 335,5 345,55 355,30 390,30',
      normal:  '0,30 30,30 40,10 50,50 60,30 90,30 100,5 110,55 120,30 150,30 160,15 170,45 180,30 210,30 220,8 230,52 240,30 270,30 280,12 290,48 300,30 330,30 340,10 350,50 360,30 390,30',
      afib:    '0,28 15,32 30,27 45,33 55,8 65,52 75,30 90,31 105,29 120,33 135,27 150,31 160,8 170,52 180,30 195,32 210,28 225,30 240,27 255,33 265,8 275,52 285,30',
      vfib:    '0,20 10,40 20,15 30,45 40,10 50,50 60,25 70,42 80,12 90,48 100,22 110,38 120,18 130,44 140,8 150,52 160,28 170,38 180,20 190,45 200,15 210,42 220,25',
      avblock: '0,30 40,30 50,10 60,50 70,30 140,30 150,5 160,55 170,30 240,30 250,10 260,50 270,30 340,30 350,5 360,55 370,30',
    };
    const pts = presets[type] || presets.normal;
    document.getElementById('waveformLine').setAttribute('points', pts);
    document.getElementById('waveformLine').setAttribute('stroke', '#6366f1');
    setTimeout(() => document.getElementById('waveformLine').setAttribute('stroke', '#4f46e5'), 500);
  }

  function resetSteps() {
    for (let i = 0; i < 5; i++) {
      const el = document.getElementById(`step-${i}`);
      el.classList.remove('done', 'active');
      el.querySelector('.step-check').classList.remove('done', 'active');
    }
  }

  async function activateStep(i, delay) {
    return new Promise(resolve => setTimeout(() => {
      const el    = document.getElementById(`step-${i}`);
      const check = el.querySelector('.step-check');
      el.classList.add('active');
      check.classList.add('active');
      resolve();
    }, delay));
  }

  async function completeStep(i, delay) {
    return new Promise(resolve => setTimeout(() => {
      const el    = document.getElementById(`step-${i}`);
      const check = el.querySelector('.step-check');
      el.classList.remove('active'); el.classList.add('done');
      check.classList.remove('active'); check.classList.add('done');
      resolve();
    }, delay));
  }

  async function analyze() {
    const signal_path = document.getElementById('signal_path').value.trim();
    const patient_id  = document.getElementById('patient_id').value.trim();
    if (!signal_path) { alert('ECG 신호 경로를 입력하세요.'); return; }

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('analyzeBtn').textContent = 'Analyzing…';
    document.getElementById('results').classList.remove('show');
    resetSteps();

    // animate steps while fetching
    activateStep(0, 0);
    completeStep(0, 400);
    activateStep(1, 500);
    completeStep(1, 900);
    activateStep(2, 1000);

    const body = {
      patient_id: patient_id || 'unknown',
      patient_info: {
        age:             parseInt(document.getElementById('age').value) || null,
        sex:             document.getElementById('sex').value || null,
        chief_complaint: document.getElementById('complaint').value || null,
      },
      data: { signal_path },
      context: { previous_findings: document.getElementById('prev_findings').value || undefined },
    };

    try {
      const res  = await fetch(`${API}/predict`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await res.json();

      completeStep(2, 0);
      await activateStep(3, 200);
      await completeStep(3, 600);
      await activateStep(4, 700);
      await completeStep(4, 1100);

      setTimeout(() => renderResult(data), 1200);
    } catch (e) {
      completeStep(2, 0);
      renderError(e.message);
    } finally {
      setTimeout(() => {
        document.getElementById('analyzeBtn').disabled = false;
        document.getElementById('analyzeBtn').textContent = 'Analyze ECG';
      }, 1300);
    }
  }

  function renderError(msg) {
    document.getElementById('resultsInner').innerHTML = `<div class="error-box">오류: ${msg}</div>`;
    document.getElementById('results').classList.add('show');
  }

  function pctClass(v) { return v >= 0.7 ? 'pct-high' : v >= 0.5 ? 'pct-mid' : 'pct-low'; }
  function dotClass(s) { return `dot-${s || 'mild'}`; }

  function renderResult(d) {
    if (d.status === 'error') { renderError(d.error); return; }

    const detected     = d.findings.filter(f => f.detected);
    const confirmed    = detected.filter(f =>  ECG_CONFIRMED.has(f.name));
    const needsConfirm = detected.filter(f => !ECG_CONFIRMED.has(f.name));
    const negatives    = d.pertinent_negatives || [];
    const m            = d.metadata || {};
    const riskCls      = { critical:'badge-critical', urgent:'badge-urgent', routine:'badge-routine' }[d.risk_level] || 'badge-routine';

    let html = `<div class="results-grid">`;

    // Risk summary (full width)
    html += `
      <div class="result-card full">
        <h3>Risk Assessment</h3>
        <div class="risk-row">
          <span class="risk-badge ${riskCls}">${d.risk_level.toUpperCase()}</span>
          <span class="risk-text">${d.report || d.summary || '소견 없음'}</span>
        </div>
      </div>`;

    // ECG confirmed
    if (confirmed.length) {
      html += `<div class="result-card"><h3>ECG 확인 소견</h3>`;
      confirmed.forEach(f => {
        html += `
          <div class="finding">
            <div class="finding-top">
              <div class="finding-dot ${dotClass(f.severity)}"></div>
              <span class="finding-name">${f.name}</span>
              <span class="finding-pct ${pctClass(f.confidence)}">${(f.confidence*100).toFixed(1)}%</span>
            </div>
            ${f.recommendation ? `<div class="finding-rec">→ ${f.recommendation}</div>` : ''}
          </div>`;
      });
      html += `</div>`;
    }

    // Needs confirm
    if (needsConfirm.length) {
      html += `<div class="result-card"><h3>추가 검사 권고</h3>`;
      needsConfirm.forEach(f => {
        html += `
          <div class="confirm">
            <span class="confirm-name">${f.name}</span>
            <span class="confirm-tag">ECG 비특이적</span>
            <span class="confirm-pct">${(f.confidence*100).toFixed(1)}%</span>
          </div>`;
      });
      html += `</div>`;
    }

    // Metadata
    if (m.hr !== undefined) {
      const hrWarn  = m.hr > 100 || m.hr < 50;
      const qtcWarn = m.qtc > 450;
      html += `
        <div class="result-card">
          <h3>Measurements</h3>
          <div class="meta-grid">
            <div class="meta-box">
              <div class="meta-lbl">Heart Rate</div>
              <div class="meta-val ${hrWarn ? 'val-warn' : 'val-ok'}">${m.hr}</div>
              <div class="meta-unit">bpm</div>
            </div>
            <div class="meta-box">
              <div class="meta-lbl">QTc</div>
              <div class="meta-val ${qtcWarn ? 'val-warn' : 'val-norm'}">${m.qtc}</div>
              <div class="meta-unit">ms</div>
            </div>
            <div class="meta-box">
              <div class="meta-lbl">Inference</div>
              <div class="meta-val val-norm">${m.inference_time_ms}</div>
              <div class="meta-unit">ms</div>
            </div>
          </div>
        </div>`;
    }

    // Pertinent negatives
    if (negatives.length) {
      html += `
        <div class="result-card">
          <h3>Pertinent Negatives</h3>
          <div class="neg-list">${negatives.map(n => `<span class="neg-pill">✓ ${n}</span>`).join('')}</div>
        </div>`;
    }

    // Normal case
    if (!detected.length) {
      html = `<div class="results-grid"><div class="result-card full">
        <h3>Result</h3>
        <div class="risk-row">
          <span class="risk-badge badge-routine">NORMAL</span>
          <span class="risk-text">ECG상 이상 소견이 감지되지 않았습니다.</span>
        </div>
      </div></div>`;
    } else {
      html += `</div>`;
    }

    document.getElementById('resultsInner').innerHTML = html;
    document.getElementById('results').classList.add('show');
  }
</script>
</body>
</html>
