# ── Kustomize EKS Overlay ────────────────────────────────────
# AWS EKS 프로덕션/스테이징 환경용 Kustomize 설정
# base(공통 서비스 정의) + EKS 전용 리소스(RDS ConfigMap, EFS, Secret)를 합쳐서 배포
# 로컬과 달리 PostgreSQL/Redis는 AWS 매니지드 서비스를 사용하므로 별도 파드 없음
# 적용 명령: kubectl apply -k k8s/overlays/eks/
# 빌드 확인: kustomize build k8s/overlays/eks/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# ── 리소스 목록 ──────────────────────────────────────────────
# base: 공통 서비스(chest, ecg, blood, orchestrator, rag, report)
# 나머지: EKS 전용 설정 (매니지드 서비스 엔드포인트, EFS, Secret)
# 주의: 로컬과 달리 postgres.yaml, redis.yaml이 없음 (AWS RDS/ElastiCache 사용)
resources:
  - ../../base          # 공통 base 매니페스트 참조
  - configmap.yaml      # EKS 환경변수 (RDS/ElastiCache 엔드포인트)
  - storageclass.yaml   # EFS StorageClass + 모델 PVC
  - secret.yaml         # AWS 자격 증명 및 DB 비밀번호

# ── 이미지 오버라이드 ────────────────────────────────────────
# base의 image 필드를 AWS ECR 레포지토리 URI로 교체
# ACCOUNT_ID → 실제 AWS 계정 ID(12자리 숫자)로 교체
# newTag → CI/CD 파이프라인에서 커밋 해시나 버전 태그로 교체 권장
# ECR 레포지토리 사전 생성 필요:
#   aws ecr create-repository --repository-name dr-ai/chest-svc
images:
  - name: chest-svc
    newName: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/dr-ai/chest-svc
    newTag: latest
  - name: ecg-svc
    newName: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/dr-ai/ecg-svc
    newTag: latest
  - name: blood-svc
    newName: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/dr-ai/blood-svc
    newTag: latest
  - name: central-orchestrator
    newName: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/dr-ai/central-orchestrator
    newTag: latest
  - name: rag-svc
    newName: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/dr-ai/rag-svc
    newTag: latest
  - name: report-svc
    newName: ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/dr-ai/report-svc
    newTag: latest
