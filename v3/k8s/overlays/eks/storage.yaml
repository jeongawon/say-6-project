# ── EFS StorageClass ──────────────────────────────────────────
# AWS EFS(Elastic File System)를 K8s 볼륨으로 사용하기 위한 StorageClass
# chest-svc, rag-svc가 ONNX 모델 파일을 공유 읽기하는 데 사용
# 사전 요구사항: EFS CSI 드라이버가 EKS 클러스터에 설치되어 있어야 함
# 설치: eksctl create addon --name aws-efs-csi-driver --cluster <클러스터명>
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
  labels:
    app.kubernetes.io/part-of: dr-ai
# EFS CSI 드라이버를 프로비저너로 사용
provisioner: efs.csi.aws.com
parameters:
  # efs-ap: EFS Access Point를 통한 동적 프로비저닝 모드
  provisioningMode: efs-ap
  # ── EFS 파일시스템 ID ────────────────────────────────────
  # AWS 콘솔에서 생성한 EFS의 fs-XXXXXXXX ID로 교체
  # 확인: aws efs describe-file-systems --query 'FileSystems[].FileSystemId'
  fileSystemId: fs-XXXXXXXXXXXXXXXXX
  # 생성되는 디렉토리의 Unix 퍼미션
  directoryPerms: "755"
  # EFS 내 기본 경로 — 모든 PV가 이 경로 하위에 생성됨
  basePath: "/dr-ai"
# Retain — PVC 삭제 후에도 EFS 데이터 보존
reclaimPolicy: Retain
# Immediate — PVC 생성 즉시 바인딩 (노드 스케줄링 대기 없음)
volumeBindingMode: Immediate
---
# ── EFS 모델 PersistentVolumeClaim ───────────────────────────
# EFS에서 ONNX 모델 파일을 읽기 위한 PVC
# chest-svc.yaml, rag-svc.yaml에서 claimName: models-pvc로 참조
# 로컬의 pv-models.yaml(hostPath)을 대체함
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: dr-ai
  labels:
    app.kubernetes.io/part-of: dr-ai
spec:
  # ReadWriteMany — EFS는 다중 노드에서 동시 읽기/쓰기 지원
  # 여러 파드가 동시에 모델 파일을 읽을 수 있음
  accessModes:
    - ReadWriteMany
  # 위에서 정의한 EFS StorageClass 참조
  storageClassName: efs-sc
  resources:
    requests:
      # 20Gi — EFS는 탄력적이므로 실제 사용량만큼만 과금
      # 모델 파일 총 크기에 맞춰 조정
      storage: 20Gi
