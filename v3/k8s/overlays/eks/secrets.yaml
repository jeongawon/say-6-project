# ── EKS 환경 Secret ──────────────────────────────────────────
# AWS EKS 환경에서 사용하는 민감한 자격 증명
# 주의: 이 파일은 git에 커밋하면 안 됨 — .gitignore에 추가 권장
# 프로덕션에서는 AWS Secrets Manager + External Secrets Operator 사용 권장
# 모든 CHANGE_ME 값을 실제 값으로 교체 후 배포할 것
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: dr-ai
# Opaque: 임의의 key-value 쌍을 저장하는 기본 Secret 타입
type: Opaque
# stringData: base64 인코딩 없이 평문으로 작성 (K8s가 자동 인코딩)
stringData:
  # ── 데이터베이스 비밀번호 ─────────────────────────────────
  # RDS PostgreSQL 마스터 비밀번호
  DB_PASSWORD: "CHANGE_ME"
  # ── Redis 비밀번호 ───────────────────────────────────────
  # ElastiCache Redis AUTH 토큰
  REDIS_PASSWORD: "CHANGE_ME"
  # ── AWS 자격 증명 ────────────────────────────────────────
  # Bedrock, S3 등 AWS 서비스 호출에 사용
  # EKS에서는 IRSA(IAM Roles for Service Accounts) 사용을 권장
  # IRSA 설정 시 이 두 키는 삭제 가능
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
