# ── 로컬 환경 ConfigMap (환경별 오버라이드) ──────────────────
# 로컬(Docker Desktop / Minikube) 개발 환경에서 사용하는 설정값
# 공통 설정은 base/common-config.yaml에서 관리
# 이 파일에는 서비스별 URL 등 환경에 따라 달라지는 값만 유지
# 값 변경 후 적용: kubectl apply -k k8s/overlays/local/
apiVersion: v1
kind: ConfigMap
metadata:
  name: dr-ai-config
  namespace: dr-ai
  labels:
    app.kubernetes.io/part-of: dr-ai
    app.kubernetes.io/managed-by: kustomize
data:
  # ── 서비스별 오버라이드만 유지 (공통 설정은 common-config에서 관리) ──
  # ONNX 모델이 마운트되는 컨테이너 내부 경로
  MODEL_DIR: "/models"
  # ── 모달 서비스 URL ──────────────────────────────────────
  # 각 마이크로서비스의 ClusterIP 서비스명:포트
  # 서비스명이나 포트 변경 시 여기도 함께 수정
  CHEST_URL: "http://chest-svc:8000/predict"
  ECG_URL: "http://ecg-svc:8000/predict"
  BLOOD_URL: "http://blood-svc:8000/predict"
