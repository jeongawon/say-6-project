# ── Redis Deployment ──────────────────────────────────────────
# 로컬 개발용 Redis 7 캐시 서버
# 세션 관리, 분석 결과 캐싱, 작업 큐 등에 사용
# Deployment 사용 — 데이터 영속성 불필요 (캐시 용도)
# EKS 환경에서는 AWS ElastiCache를 사용하므로 이 파일은 로컬 전용
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: dr-ai
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: dr-ai
    # component: cache — 캐시 계층
    app.kubernetes.io/component: cache
spec:
  # 레플리카 1개 — 로컬에서는 단일 인스턴스로 충분
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: dr-ai
    spec:
      containers:
        - name: redis
          # Redis 7 공식 이미지 — 비밀번호 미설정 (로컬 전용)
          image: redis:7
          ports:
            - containerPort: 6379
              protocol: TCP
          # ── 리소스 설정 ──────────────────────────────────
          # 캐시 용도이므로 최소 리소스 — requests 100m/128Mi
          # 캐시 데이터가 많아지면 limits.memory를 늘릴 것
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          # ── Liveness Probe ───────────────────────────────
          # redis-cli ping으로 서버 응답 확인
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # ── Readiness Probe ──────────────────────────────
          # Redis가 명령을 받을 준비가 되었는지 확인
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
---
# ── Redis Service ────────────────────────────────────────────
# ClusterIP 타입 — 클러스터 내부에서 redis-svc:6379로 접근
# ConfigMap의 REDIS_URL에서 이 서비스명을 참조
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: dr-ai
  labels:
    app: redis
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: dr-ai
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    # Redis 기본 포트 6379
    - port: 6379
      targetPort: 6379
      protocol: TCP
