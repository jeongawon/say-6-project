# -- AWS Bedrock Secret (local only) -------
# rag-svc, report-svc가 Bedrock Claude 호출에 필요
# EKS에서는 IRSA로 대체하므로 이 파일은 로컬 전용
# 실제 키 값은 배포 전에 수동으로 입력
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: dr-ai
  labels:
    app.kubernetes.io/part-of: dr-ai
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "CHANGE_ME"
  AWS_SECRET_ACCESS_KEY: "CHANGE_ME"
  AWS_DEFAULT_REGION: "ap-northeast-2"
