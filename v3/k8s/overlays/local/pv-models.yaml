# ── 모델 PersistentVolume (로컬 전용) ────────────────────────
# 로컬 환경에서 ONNX 모델 파일을 K8s 클러스터에 제공하는 볼륨
# 호스트의 /data/models 디렉토리를 클러스터에 마운트
# chest-svc, rag-svc가 이 볼륨을 읽기 전용으로 공유
# EKS 환경에서는 storageclass.yaml의 EFS를 대신 사용
apiVersion: v1
kind: PersistentVolume
metadata:
  name: models-pv
  labels:
    app.kubernetes.io/part-of: dr-ai
    # type: local — 노드 로컬 스토리지임을 표시
    type: local
spec:
  # ── 용량 ─────────────────────────────────────────────────
  # 10Gi — ONNX 모델 파일 총 용량에 맞춰 조정
  # 모델 추가 시 이 값과 PVC의 storage를 함께 늘릴 것
  capacity:
    storage: 10Gi
  # ReadOnlyMany — 여러 파드(chest-svc, rag-svc)가 동시에 읽기 가능
  accessModes:
    - ReadOnlyMany
  # Retain — PVC 삭제 후에도 데이터 보존 (모델 파일 보호)
  persistentVolumeReclaimPolicy: Retain
  # storageClassName: manual — PVC와 수동 바인딩
  storageClassName: manual
  # ── hostPath ─────────────────────────────────────────────
  # 호스트 머신의 /data/models 디렉토리를 마운트
  # Docker Desktop: 이 경로에 모델 파일을 미리 복사해야 함
  # Minikube: minikube ssh로 접속하여 /data/models에 파일 배치
  # DirectoryOrCreate: 디렉토리가 없으면 자동 생성
  hostPath:
    path: /data/models
    type: DirectoryOrCreate
---
# ── 모델 PersistentVolumeClaim ───────────────────────────────
# 위의 PV를 파드에 연결하는 클레임
# chest-svc.yaml, rag-svc.yaml에서 claimName: models-pvc로 참조
# storageClassName이 PV와 일치해야 바인딩됨
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: dr-ai
  labels:
    app.kubernetes.io/part-of: dr-ai
spec:
  accessModes:
    - ReadOnlyMany
  # PV의 storageClassName과 일치해야 함
  storageClassName: manual
  resources:
    requests:
      # PV의 capacity 이하로 설정
      storage: 10Gi
