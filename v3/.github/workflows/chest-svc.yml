# ── chest-svc CI/CD 워크플로 ──────────────────────────────────
# 흉부 X-Ray 분석 서비스의 빌드/테스트/배포 파이프라인
# - build 잡: Docker 이미지 빌드 + 헬스체크 스모크 테스트
# - push-ecr 잡: main 브랜치 push 시에만 AWS ECR에 이미지 배포
# ──────────────────────────────────────────────────────────────
name: Build chest-svc

# ── 트리거 조건 ──────────────────────────────────────────────
# services/chest-svc/ 하위 파일이 변경될 때만 실행 (경로 필터)
# push: main 또는 feature/* 브랜치에 푸시 시
# pull_request: chest-svc 관련 파일이 변경된 PR 생성/업데이트 시
on:
  push:
    paths:
      - "services/chest-svc/**"
    branches:
      - main
      - "feature/**"
  pull_request:
    paths:
      - "services/chest-svc/**"

# ── 공통 환경변수 ────────────────────────────────────────────
env:
  SERVICE_NAME: chest-svc
  AWS_REGION: ap-northeast-2          # 서울 리전

jobs:
  # ── 빌드 잡: Docker 이미지 빌드 및 스모크 테스트 ────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read                   # 소스코드 읽기 권한
      id-token: write                  # OIDC 토큰 발급 권한 (AWS 인증용)

    steps:
      # 1단계: 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2단계: Docker Buildx 설정 (멀티 플랫폼 빌드 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3단계: Docker 이미지 빌드 (커밋 SHA + latest 태그)
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.SERVICE_NAME }}:latest \
            -f services/${{ env.SERVICE_NAME }}/Dockerfile \
            services/${{ env.SERVICE_NAME }}

      # 4단계: 스모크 테스트 — 컨테이너 실행 후 /healthz 엔드포인트 확인
      # 모델 로딩 시간을 고려하여 10초 대기 후 헬스체크
      - name: Run health check smoke test
        run: |
          docker run -d --name test-container \
            -p 8000:8000 \
            ${{ env.SERVICE_NAME }}:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8000/healthz || echo "Health check not available in CI"
          docker stop test-container
          docker rm test-container

  # ── ECR 푸시 잡: AWS ECR에 이미지 배포 ─────────────────────
  # 실행 조건: main 브랜치에 push 이벤트일 때만 (PR이나 feature 브랜치 제외)
  push-ecr:
    needs: build                       # build 잡 성공 후에만 실행
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write                  # AWS OIDC 인증에 필요

    steps:
      # 1단계: 소스코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2단계: AWS 자격증명 구성 (GitHub OIDC → AWS IAM Role)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 3단계: Amazon ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4단계: Docker 이미지 빌드 후 ECR에 푸시 (커밋 SHA + latest 태그)
      - name: Build and push to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: dr-ai/${{ env.SERVICE_NAME }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f services/${{ env.SERVICE_NAME }}/Dockerfile \
            services/${{ env.SERVICE_NAME }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
