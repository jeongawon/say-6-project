apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecg-modal
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecg-modal
  template:
    metadata:
      labels:
        app: ecg-modal
    spec:
      containers:
      - name: ecg-modal
        image: 905418313170.dkr.ecr.ap-northeast-2.amazonaws.com/ecg-modal:latest
        ports:
        - containerPort: 8000
        env:
        - name: S3_BUCKET
          value: "say2-6team"
        - name: S3_MODEL_KEY
          value: "mimic/ecg/ecg_s6.onnx"
        - name: S3_DATA_KEY
          value: "mimic/ecg/ecg_s6.onnx.data"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: ecg-modal-service
  namespace: default
spec:
  selector:
    app: ecg-modal
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
